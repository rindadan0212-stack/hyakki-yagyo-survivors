<!doctype html>

<title>Hyakki HTML Icon & FX Preview</title>
<style>
  :root { color-scheme: dark; font-family: system-ui, sans-serif; background:#070913; color:#dfe7f5; }
  body { margin: 0; padding: 28px; }
  h1, h2 { margin: 0 0 18px; font-size: 22px; letter-spacing: 0; }
  h2 { margin-top: 34px; font-size: 17px; color:#ffe7a0; }
  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(104px, 1fr)); gap:14px; }
  figure { margin:0; min-width:0; }
  .panel { width:72px; height:72px; display:grid; place-items:center; background:#161a28; border:1px solid #2e3650; box-shadow:0 0 18px #0008 inset; }
  .panel img { width:56px; height:56px; image-rendering:auto; object-fit:contain; }
  figcaption { margin-top:6px; color:#8fa6c9; font-size:11px; overflow-wrap:anywhere; }
  .fxgrid { display:grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap:14px; }
  .fx { padding:12px; background:#0e1220; border:1px solid #25304a; }
  .fx img { image-rendering:pixelated; width:auto; height:64px; background:
    linear-gradient(45deg, #141827 25%, transparent 25%),
    linear-gradient(-45deg, #141827 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #141827 75%),
    linear-gradient(-45deg, transparent 75%, #141827 75%);
    background-size: 16px 16px; background-position: 0 0, 0 8px, 8px -8px, -8px 0; }
</style>
